physics:
  epsilon: 0.03

punishments:
  flag-rate:
    threshold: 18
    ban-duration-seconds: 86400

alerts:
  broadcast-enabled: true
  console-log-enabled: true

# Per-check settings (section 13). enabled toggles the check entirely.
# alert-vl notifies staff, punish-vl runs punish-command and resets that
# check's VL. {player} is substituted with the player's name. Never
# customize punish-command to reveal which check fired - the player must
# only ever see the generic message (section 9).
checks:
  Speed:
    enabled: true
    alert-vl: 10
    punish-vl: 30
    punish-command: "kick {player} Has sido expulsado del servidor"
